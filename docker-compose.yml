version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: cypadi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cypadi_support
      MYSQL_USER: cypadi
      MYSQL_PASSWORD: cypadi_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      MYSQL_USER: cypadi
      MYSQL_PASSWORD: cypadi_password
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DB: cypadi_support
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:

